<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Orders</title>

    <link rel="stylesheet" href="/css/global.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #222d55;
            color: white;
        }

        input, select {
            width: 100%;
            padding: 6px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }

        .add-btn {
            background: #4CAF50;
            color: white;
            margin-top: 10px;
        }

        .submit-btn {
            background: #222d55;
            color: white;
            margin-top: 20px;
        }

        .remove-btn {
            transform: scale(.6);
            background: red;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            border: none;
        }

        .checkbox-center {
            text-align: center;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 500px;
            border-radius: 10px;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        /* SUBORDER BLOCKS */
        #suborderContainer {
            margin-top: 20px;
        }

        .suborder-block {
            margin-bottom: 25px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            background: #fff;
        }

        .suborder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }

        .suborder-title {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="app"></div>
    <script type="module" src="./order.obf.js"></script>

</body>
</html>
